<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVACH V2 - Admin Dashboard Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            border-top: 6px solid #d4af37;
        }
        h2 {
            text-align: center;
            color: #0a2540;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: #0a2540;
            box-shadow: 0 0 0 3px rgba(10, 37, 64, 0.1);
        }
        .btn-login {
            width: 100%;
            background: #0a2540;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #1e293b;
        }
        .error-msg {
            color: #b91c1c;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🛡️ KAVACH അഡ്മിൻ ലോഗിൻ</h2>
    
    <div class="form-group">
        <label for="username">Admin ID / യൂസർനെയിം</label>
        <input type="text" id="username" placeholder="യൂസർനെയിം ടൈപ്പ് ചെയ്യുക">
    </div>

    <div class="form-group">
        <label for="password">Password / പാസ്‌വേഡ്</label>
        <input type="password" id="password" placeholder="പാസ്‌വേഡ് ടൈപ്പ് ചെയ്യുക">
    </div>

    <button type="button" class="btn-login" onclick="checkLogin()">Login / പ്രവേശിക്കുക</button>
    
    <div class="error-msg" id="errorMsg">❌ തെറ്റായ യൂസർനെയിം അല്ലെങ്കിൽ പാസ്‌വേഡ്!</div>
</div>

<script>
function checkLogin() {
    const userInp = document.getElementById("username").value;
    const passInp = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    // ലോഗിൻ ഐഡിയും പാസ്‌വേഡും
    const correctUsername = "admin@school.edu";
    const correctPassword = "Kavach@2026"; 

    if (userInp === correctUsername && passInp === correctPassword) {
        errorMsg.style.display = "none";
        alert("ലോഗിൻ വിജയകരമായി പൂർത്തിയായി!");
        // ശരിയാണെങ്കിൽ നേരിട്ട് നിങ്ങളുടെ ഫോംസ്പ്രീ സബ്മിഷൻ പേജിലേക്ക് പോകും
        window.location.href = "https://formspree.io/forms/xgobqand/submissions";
    } else {
        errorMsg.style.display = "block";
    }
}
</script>

</body>
</html>
